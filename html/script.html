<script>
  const host = "{{ .Host }}";
  const json = "{{ .JSON }}";
  const data = JSON.parse(json);
  const commandEl = document.getElementById("command");
  const outputEl = document.getElementById("output");
  const portInput = document.getElementById("portInput");
  let path = "";
  let ipQuery = "";
  let portQuery = "";

  function render() {
    commandEl.textContent = `curl ${host}/${path}${portQuery}${ipQuery}`;
  }

  function changeInput(input, button) {
    path = input === "ip" ? "" : input;
    portQuery = "";
    portInput.classList.add("hidden");

    switch (input) {
      case "json":
        outputEl.textContent = json;
        break;
      case "country-iso":
        outputEl.textContent = data.country_iso;
        break;
      case "port":
        path = "port";
        portQuery = `/${portInput.value}`;
        portInput.classList.remove("hidden");
        outputEl.textContent = "{}";
        break;
      case "ip":
        outputEl.textContent = data.ip;
        break;
      default:
        outputEl.textContent = data[input];
    }

    if (button) {
      document.querySelectorAll("button.selected").forEach((selectedButton) => {
        selectedButton.classList.remove("selected");
      });
      button.classList.add("selected");
    }

    render();
  }

  function navigate() {
    window.location = `${path}${portQuery}${ipQuery}`;
  }

  function updatePort(value) {
    portQuery = `/${value}`;
    render();
  }

  function updateIP(value) {
    ipQuery = `?ip=${value}`;
    changeInput("ip");
  }

  changeInput("ip");

  /* Theme toggle */
  (function () {
    var root = document.documentElement;
    var current = root.getAttribute("data-theme") || "auto";
    var buttons = document.querySelectorAll("[data-theme-value]");

    function apply(theme) {
      current = theme;
      root.setAttribute("data-theme", theme);
      localStorage.setItem("theme", theme);
      buttons.forEach(function (btn) {
        btn.classList.toggle("active", btn.getAttribute("data-theme-value") === theme);
      });
    }

    buttons.forEach(function (btn) {
      btn.addEventListener("click", function () {
        apply(btn.getAttribute("data-theme-value"));
      });
    });

    apply(current);
  })();
</script>
